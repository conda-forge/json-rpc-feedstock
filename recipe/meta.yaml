{% set name = "json-rpc" %}
{% set version = "1.12.2" %}
{% set hash_val = "0e21126f96ed12cdc75939a293bbc2e8" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  md5: {{ hash_val }}

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools

  run:
    - python >={{ python_min }}

test:
  imports:
    - jsonrpc
    - jsonrpc.backend
    - jsonrpc.tests
    - jsonrpc.dispatcher

  requires:
    - mock
    - nose
    - python {{ python_min }}

about:
  home: https://github.com/pavlov99/json-rpc
  license: MIT
  license_file: LICENSE.txt
  summary: 'JSON-RPC transport realisation'

extra:
  recipe-maintainers:
    - dharhas
    - ccordoba12
